<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCBE Creador de Eventos de Discord</title>
    <link rel="icon" type="image/png" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2f3136; /* Discord Dark */
            --card-bg: rgba(54, 57, 63, 0.8);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #5865F2; /* Discord Purple Event Theme */
            --primary-hover: #4752c4;
            --text-main: #FFFFFF;
            --text-muted: #dcddde;
            --glass-bg: rgba(0, 0, 0, 0.25);
            --input-bg: rgba(32, 34, 37, 0.6);
            --success: #3ba55c;
            --warning: #faa81a;
            --danger: #ed4245;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 25%, rgba(88, 101, 242, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 85% 75%, rgba(235, 69, 158, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 35%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Layout */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.5s ease-out;
        }

        @media (max-width: 950px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Glassmorphism Card Utils */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
        }

        h1, h2 {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.2rem;
        }

        h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #ffffff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Form Elements */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }

        .full-width {
            grid-column: span 3;
        }

        @media (max-width: 600px) {
            .form-grid > * {
                grid-column: span 3 !important;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .required::after {
            content: " *";
            color: var(--danger);
        }

        input, textarea, select {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 0.75rem 0.9rem;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.25);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Buttons */
        .btn {
            cursor: pointer;
            padding: 0.75rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #7289da;
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .btn-demo {
            background: rgba(88, 101, 242, 0.1);
            color: #7289da;
            border: 1px solid rgba(88, 101, 242, 0.2);
        }

        .btn-demo:hover {
            background: rgba(88, 101, 242, 0.2);
            color: white;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        /* Emoji Chips */
        .emoji-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            border-radius: 20px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            font-size: 0.9rem;
        }

        .chip:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .chip.selected {
            background: rgba(88, 101, 242, 0.2);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 8px rgba(88, 101, 242, 0.3);
        }

        /* Preview container styling */
        .preview-container {
            background: rgba(24, 25, 28, 0.9); /* Darker Discord theme for code blocks */
            border-color: #202225;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 520px;
        }

        .preview-box {
            background: #2f3136;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1.2rem;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.85rem;
            color: #8e9297;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-y: auto;
            flex-grow: 1;
            margin: 1rem 0;
            max-height: 380px;
            line-height: 1.5;
            border-left: 4px solid var(--primary);
        }

        .preview-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--card-border);
            padding-top: 1rem;
        }

        .char-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .char-count.limit-reached {
            color: var(--danger);
            animation: shake 0.3s ease;
        }

        /* Toast Alert */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(88, 101, 242, 0.95);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInBlock {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Custom Scrollbar for preview */
        .preview-box::-webkit-scrollbar {
            width: 8px;
        }
        .preview-box::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        .preview-box::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .preview-box::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.25);
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- FORM PANEL -->
        <section class="glass-panel">
            <div class="header-section">
                <div>
                    <h1>CCBE creador de eventos</h1>
                    <div class="subtitle">Crear anuncios de eventos premium para el Discord de tu Org</div>
                </div>
                <button type="button" class="btn btn-demo" id="btnDemo">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    Cargar Demo
                </button>
            </div>

            <!-- The main events form -->
            <form id="eventForm">
                <div class="form-grid">

                    <div class="form-group full-width">
                        <label for="title" class="required">Título del Evento</label>
                        <input type="text" id="title" placeholder="Ej: Operación Jumptown" required>
                    </div>

                    <div class="form-group">
                        <label for="date" class="required">Fecha</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label for="time" class="required">Hora de inicio</label>
                        <input type="time" id="time" required>
                    </div>

                    <div class="form-group">
                        <label for="timeEnd">Hora de fin</label>
                        <input type="time" id="timeEnd">
                    </div>

                    <div class="form-group full-width">
                        <label for="location" class="required">Punto de encuentro</label>
                        <input type="text" id="location" placeholder="Ej: Grim HEX (Yela)" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="description" class="required">Descripción del Evento</label>
                        <textarea id="description" placeholder="Detalles de la misión, naves requeridas..." rows="4" required></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label for="notes">Notas finales (Opcional)</label>
                        <textarea id="notes" placeholder="Ej: ¡Traed railguns! (Mayús+Enter para saltos)" rows="2"></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label for="organizer">Organizador / Etiqueta</label>
                        <input type="text" id="organizer" placeholder="Ej: @Almirante">
                    </div>

                    <div class="form-group full-width">
                        <label>Reacciones para apuntarse</label>
                        <div class="emoji-chips" id="emojiSelector">
                            <div class="chip selected" data-emoji="✅">✅ Apuntarse</div>
                            <div class="chip" data-emoji="⛏️">⛏️ Minería</div>
                            <div class="chip" data-emoji=":gun:">🔫 Combate</div>
                            <div class="chip" data-emoji="✈️">✈️ Piloto</div>
                            <div class="chip" data-emoji=":medical_symbol:">⚕️ Médico</div>
                        </div>
                        <input type="text" id="customEmojis" placeholder="O escribe los tuyos..." style="margin-top: 0.5rem;">
                    </div>

                </div>

                <div class="actions">
                    <button type="button" class="btn btn-secondary" id="btnClear" style="flex:1">Limpiar Formulario</button>
                </div>
            </form>
        </section>

        <!-- PREVIEW PANEL -->
        <div style="display: flex; flex-direction: column; gap: 2rem;">
            <section class="glass-panel preview-container">
                <h2>Vista Previa de Anuncio</h2>
                <div class="preview-box" id="previewOutput">Rellena el formulario para ver el resultado...</div>

                <div class="preview-footer">
                    <span class="char-count" id="charCount">0 caracteres</span>
                    <button type="button" class="btn btn-primary" id="btnCopy">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copiar Markdown
                    </button>
                </div>
            </section>

            <!-- Brand Footer with Creator Signature -->
            <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding-bottom: 1rem;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 0.8rem; flex-wrap: wrap;">
                    <span style="font-size: 0.75rem; font-weight: 600; color: rgba(255, 255, 255, 0.35); text-transform: uppercase; letter-spacing: 0.05em;">Created by</span>
                    <img src="assets/signature.png" alt="The Razore Signature" style="max-height: 38px; opacity: 0.85; filter: drop-shadow(0 0 4px rgba(88, 101, 242, 0.25));">
                    <span style="font-size: 0.75rem; font-weight: 600; color: rgba(255, 255, 255, 0.35); text-transform: uppercase; letter-spacing: 0.05em;">for</span>
                    <img src="assets/ccbe_logo.png" alt="CCBE Logo" style="max-height: 28px; opacity: 0.9; filter: drop-shadow(0 0 6px rgba(88, 101, 242, 0.35));">
                </div>
            </div>
        </div>

    </div>

    <!-- Copied Alert -->
    <div class="toast" id="toast">🚀 ¡Copiado con éxito!</div>

    <script>
        // State
        const form = document.getElementById('eventForm');
        const preview = document.getElementById('previewOutput');
        const btnCopy = document.getElementById('btnCopy');
        const btnClear = document.getElementById('btnClear');
        const btnDemo = document.getElementById('btnDemo');
        const toast = document.getElementById('toast');
        const charCount = document.getElementById('charCount');
        const emojiChips = document.querySelectorAll('.chip');
        const customEmojisInput = document.getElementById('customEmojis');

        let selectedEmojis = new Set(['✅']);

        // Format Generator
        function generateMarkdown() {
            const data = {
                title: document.getElementById('title').value.trim(),
                date: document.getElementById('date').value.trim(),
                time: document.getElementById('time').value.trim(),
                timeEnd: document.getElementById('timeEnd').value.trim(),
                location: document.getElementById('location').value.trim(),
                description: document.getElementById('description').value.trim(),
                notes: document.getElementById('notes').value.trim(),
                organizer: document.getElementById('organizer').value.trim(),
                emojis: getReactionString()
            };

            // Validation for copy button state (visual only)
            const isValid = data.title && data.date && data.time && data.location && data.description;
            btnCopy.style.opacity = isValid ? '1' : '0.5';
            btnCopy.style.cursor = isValid ? 'pointer' : 'not-allowed';

            if (!isValid && !data.title) {
                // Don't show confusing incomplete text if practically empty
                return "Rellena los campos obligatorios para generar la invitación.";
            }

            let markdown = `# 📢 ${data.title}\n`;

            // Create date object from inputs to get timestamp
            const dateTime = new Date(`${data.date}T${data.time}`);
            const timestamp = Math.floor(dateTime.getTime() / 1000);

            markdown += `📅 **<t:${timestamp}:F>**\n`;

            if (data.timeEnd) {
                // Build a Unix timestamp for the end time (same date, end hour)
                const dateTimeEnd = new Date(`${data.date}T${data.timeEnd}`);
                const timestampEnd = Math.floor(dateTimeEnd.getTime() / 1000);
                markdown += `🕐 **Hora de finalización estimada:** <t:${timestampEnd}:F>\n`;
            }

            markdown += `📍 ${data.location}\n\n`;

            markdown += `📝 ${data.description}\n`;

            if (data.notes) {
                markdown += `\n🗒️ ${data.notes}\n`;
            }

            if (data.organizer) {
                markdown += `\n👤 ${data.organizer}\n`;
            }

            // Use all selected emojis
            const emojis = data.emojis || '✅';
            markdown += `\n${emojis} Marcad para apuntaros`;

            return markdown;
        }

        function getReactionString() {
            // Use custom input if present, otherwise chips
            const custom = customEmojisInput.value.trim();
            if (custom) return custom;
            return Array.from(selectedEmojis).join(' ');
        }

        // Event Listeners
        function updatePreview() {
            const mk = generateMarkdown();
            preview.textContent = mk;
            charCount.textContent = `${mk.length} caracteres`;
        }

        // Input Bindings
        ['input', 'textarea'].forEach(tag => {
            const inputs = form.querySelectorAll(tag);
            inputs.forEach(input => {
                input.addEventListener('input', updatePreview);
            });
        });

        // Emoji Chips Logic
        emojiChips.forEach(chip => {
            chip.addEventListener('click', () => {
                const emoji = chip.dataset.emoji;
                if (selectedEmojis.has(emoji)) {
                    if (selectedEmojis.size > 1) selectedEmojis.delete(emoji);
                } else {
                    selectedEmojis.add(emoji);
                }

                // Visual update
                emojiChips.forEach(c => {
                    c.classList.toggle('selected', selectedEmojis.has(c.dataset.emoji));
                });

                // Clear custom input if using chips
                if (customEmojisInput.value) {
                    customEmojisInput.value = '';
                    selectedEmojis.clear();
                    selectedEmojis.add(emoji);
                    emojiChips.forEach(c => c.classList.toggle('selected', selectedEmojis.has(c.dataset.emoji)));
                }

                updatePreview();
            });
        });

        customEmojisInput.addEventListener('input', () => {
            // Deselect visual chips if user types manually
            if (customEmojisInput.value.length > 0) {
                emojiChips.forEach(c => c.classList.remove('selected'));
            }
            updatePreview();
        });

        // Copy Function
        btnCopy.addEventListener('click', () => {
            const content = preview.textContent;
            if (content.startsWith("Rellena")) {
                showToast("⚠️ Rellena los campos obligatorios primero");
                return;
            }

            navigator.clipboard.writeText(content).then(() => {
                showToast("🚀 ¡Copiado con éxito!");
            }).catch(err => {
                showToast("❌ Error al copiar");
            });
        });

        // Clear Function
        btnClear.addEventListener('click', () => {
            form.reset();
            selectedEmojis = new Set(['✅']);
            emojiChips.forEach(c => c.classList.toggle('selected', selectedEmojis.has(c.dataset.emoji)));
            customEmojisInput.value = '';
            updatePreview();
            showToast("🧹 Formulario restablecido");
        });

        // Demo Data
        btnDemo.addEventListener('click', () => {
            const today = new Date();
            const nextWeek = new Date(today);
            nextWeek.setDate(today.getDate() + 7);

            document.getElementById('title').value = "Operación: Jumptown 2.0";
            document.getElementById('date').value = nextWeek.toISOString().split('T')[0];
            document.getElementById('time').value = "21:30";
            document.getElementById('timeEnd').value = "23:30";
            document.getElementById('location').value = "Port Olisar (Crusader)";
            document.getElementById('description').value = "Vamos a asegurar el laboratorio de drogas en Yela. \nNecesitamos:\n- 2 Pilotos de A2/C2\n- 4 Escoltas (Gladius/Arrow)\n- 10 Marines para tierra\n\n¡La UEC nos espera!";
            document.getElementById('notes').value = "Configurad el spawn en Grim HEX por si acaso.";
            document.getElementById('organizer').value = "@Almirante";
            updatePreview();
            showToast("🎮 Demo cargada con éxito");
        });

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Init
        updatePreview();

    </script>
</body>

</html>
